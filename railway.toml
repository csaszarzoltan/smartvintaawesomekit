# SmartVintaAwesomeKit — Railway deployment configuration
#
# Smart Python developer toolkit — ASGI entry point, CLI tool, and library.
# Deploy as a web service to showcase the toolkit's API utilities.
# ──────────────────────────────────────────────────────────────────────

[build]
builder = "railpack"

[deploy]
startCommand = "sh -c 'uvicorn smartvintaawesomekit.app:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Memory and CPU are auto-allocated by Railpack on the free plan.
